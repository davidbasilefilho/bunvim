name: CI
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Install Dependencies
        run: bun install
      - name: Check & Lint
        run: bun run check
      - name: Test
        run: bun run test
      - name: Build
        run: bun run build
