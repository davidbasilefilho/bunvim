[tasks.build]
description = "Build for current platform"
run = """
tsdown
bun build ./dist/index.mjs --compile --minify --sourcemap --outfile ../../bin/bvim --external tree-sitter
"""

[tasks."build:linux"]
description = "Build for Linux x64"
run = """
tsdown
mkdir -p ../../bin
bun build ./dist/index.mjs --compile --minify --sourcemap --target=bun-linux-x64 --outfile ../../bin/bvim-linux-x64 --external tree-sitter
"""

[tasks."build:darwin"]
description = "Build for macOS ARM64"
run = """
tsdown
mkdir -p ../../bin
bun build ./dist/index.mjs --compile --minify --sourcemap --target=bun-darwin-arm64 --outfile ../../bin/bvim-darwin-arm64 --external tree-sitter
"""

[tasks."build:windows"]
description = "Build for Windows x64"
run = """
tsdown
mkdir -p ../../bin
bun build ./dist/index.mjs --compile --minify --sourcemap --target=bun-windows-x64 --outfile ../../bin/bvim-windows-x64.exe --external tree-sitter
"""

[tasks."build:all"]
description = "Build for all platforms"
depends = ["build:linux", "build:darwin", "build:windows"]
