[tools]
biome = "latest"
bun = "latest"
zig = "latest"

[tasks.build]
description = "Build optimized bvim for the current platform"
run = "bun build ./src/index.tsx --compile --minify --sourcemap --outfile ./bin/bvim --external tree-sitter --external tree-sitter-javascript --external tree-sitter-json --external tree-sitter-markdown --external tree-sitter-typescript"

[tasks."build:debug"]
description = "Build bvim with debug info for the current platform"
run = "bun build ./src/index.tsx --compile --outfile ./bin/bvim-debug --external tree-sitter --external tree-sitter-javascript --external tree-sitter-json --external tree-sitter-markdown --external tree-sitter-typescript"

[tasks."build:all"]
description = "Build optimized bvim for all platforms"
depends = ["build:linux", "build:darwin", "build:windows"]

[tasks."build:all:debug"]
description = "Build debug bvim for all platforms"
depends = ["build:linux:debug", "build:darwin:debug", "build:windows:debug"]

[tasks."build:linux"]
run = "mkdir -p bin && bun build ./src/index.tsx --compile --minify --sourcemap --target=bun-linux-x64 --outfile ./bin/bvim-linux-x64 --external tree-sitter --external tree-sitter-javascript --external tree-sitter-json --external tree-sitter-markdown --external tree-sitter-typescript"

[tasks."build:linux:debug"]
run = "mkdir -p bin && bun build ./src/index.tsx --compile --target=bun-linux-x64 --outfile ./bin/bvim-linux-x64-debug --external tree-sitter --external tree-sitter-javascript --external tree-sitter-json --external tree-sitter-markdown --external tree-sitter-typescript"

[tasks."build:darwin"]
run = "mkdir -p bin && bun build ./src/index.tsx --compile --minify --sourcemap --target=bun-darwin-arm64 --outfile ./bin/bvim-darwin-arm64 --external tree-sitter --external tree-sitter-javascript --external tree-sitter-json --external tree-sitter-markdown --external tree-sitter-typescript"

[tasks."build:darwin:debug"]
run = "mkdir -p bin && bun build ./src/index.tsx --compile --target=bun-darwin-arm64 --outfile ./bin/bvim-darwin-arm64-debug --external tree-sitter --external tree-sitter-javascript --external tree-sitter-json --external tree-sitter-markdown --external tree-sitter-typescript"

[tasks."build:windows"]
run = "mkdir -p bin && bun build ./src/index.tsx --compile --minify --sourcemap --target=bun-windows-x64 --outfile ./bin/bvim-windows-x64.exe --external tree-sitter --external tree-sitter-javascript --external tree-sitter-json --external tree-sitter-markdown --external tree-sitter-typescript"

[tasks."build:windows:debug"]
run = "mkdir -p bin && bun build ./src/index.tsx --compile --target=bun-windows-x64 --outfile ./bin/bvim-windows-x64-debug.exe --external tree-sitter --external tree-sitter-javascript --external tree-sitter-json --external tree-sitter-markdown --external tree-sitter-typescript"

[tasks.lint]
run = "biome lint --write ."

[tasks.format]
run = "biome format --write ."

[tasks.check]
run = "biome check --write ."

[tasks.dev]
run = "bun run --watch src/index.tsx"
